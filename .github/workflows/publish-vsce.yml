name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate package metadata
        run: |
          node -e "const pkg = require('./package.json'); if (!pkg.publisher) { throw new Error('package.json is missing the publisher field required for vsce publish'); }"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:vsce
